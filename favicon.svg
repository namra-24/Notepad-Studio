<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Notepad body: slightly rotated for a friendly, casual feel -->
  <g transform="rotate(-4 32 32)">
    <rect x="14" y="10" width="36" height="46" rx="6" fill="#FFF6EF" stroke="#4A3F4E" stroke-width="2.5"/>
    <!-- ruled lines -->
    <line x1="20" y1="30" x2="44" y2="30" stroke="#FFC4D6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="44" y2="38" stroke="#FFC4D6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="46" x2="38" y2="46" stroke="#FFC4D6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- spiral binding -->
    <circle cx="14" cy="16" r="2.6" fill="none" stroke="#4A3F4E" stroke-width="2.2"/>
    <circle cx="14" cy="26" r="2.6" fill="none" stroke="#4A3F4E" stroke-width="2.2"/>
    <circle cx="14" cy="36" r="2.6" fill="none" stroke="#4A3F4E" stroke-width="2.2"/>
    <circle cx="14" cy="46" r="2.6" fill="none" stroke="#4A3F4E" stroke-width="2.2"/>
  </g>
  <!-- pencil accent -->
  <g transform="rotate(40 48 20)">
    <rect x="45" y="6" width="6" height="24" rx="2" fill="#FF8FB1" stroke="#4A3F4E" stroke-width="2"/>
    <polygon points="45,30 51,30 48,37" fill="#4A3F4E"/>
  </g>
</svg>
